# deny.toml — cargo-deny configuration
#
# Implements the dependency/license/advisory checks named in rust-coding-rules
# RS-3 enforcement map. Run with `cargo deny check` in CI. Schema as of
# cargo-deny 0.16+; run `cargo deny --version` and adjust if older.

[advisories]
# RustSec advisory database. Fail the build on any known vulnerability.
version = 2
yanked = "deny"
ignore = [
    # RS-92: each ignore documents a reason + tracking note.
    # `paste` is unmaintained (not vulnerable, no safe upgrade). It is pulled in
    # transitively by the GUI: eframe -> accesskit_winit -> accesskit_windows ->
    # paste. Nothing we depend on directly; drop this once eframe's tree moves off
    # paste. https://rustsec.org/advisories/RUSTSEC-2024-0436
    "RUSTSEC-2024-0436",
    # `ttf-parser` is unmaintained (not vulnerable, no safe upgrade available). It is
    # pulled in transitively by the GUI font stack: eframe -> egui -> epaint ->
    # ttf-parser. Nothing we depend on directly; drop this once epaint's tree moves
    # off it. https://rustsec.org/advisories/RUSTSEC-2026-0192
    "RUSTSEC-2026-0192",
    # `quick-xml` quadratic-time attribute-duplicate check (DoS on adversarial XML).
    # Pulled in transitively by the GUI only, in two places we never feed untrusted
    # XML: the a11y stack (eframe -> accesskit -> atspi -> zbus_xml -> quick-xml
    # 0.30) and Wayland (eframe -> winit -> wayland-scanner -> quick-xml 0.39). No
    # semver-compatible patched release is reachable yet; drop this once eframe's
    # tree moves to a fixed quick-xml. https://rustsec.org/advisories/RUSTSEC-2026-0194
    "RUSTSEC-2026-0194",
]

[licenses]
# Allow-list only. An unlisted license fails the build — review before adding.
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",       # Boost Software License — permissive (clipboard-win, error-code via eframe)
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9
# Copyleft licenses are absent from the allow-list, so they fail by default — the
# intended behaviour. The exceptions below scope the few non-permissive or
# non-SPDX licenses to the single crate that carries them, rather than allowing
# them tree-wide.
exceptions = [
    # `directories` -> dirs-sys -> option-ext: MPL-2.0 is weak, file-level
    # copyleft; using the crate unmodified as a dependency does not affect our
    # MIT licensing.
    { crate = "option-ext", allow = ["MPL-2.0"] },
    # egui's bundled default fonts. OFL-1.1 (SIL Open Font License) and the
    # Ubuntu Font License (non-SPDX, hence LicenseRef-) cover the embedded font
    # files, not code.
    { crate = "epaint_default_fonts", allow = ["OFL-1.1", "LicenseRef-UFL-1.0"] },
]

[bans]
# Supply-chain hygiene: catch duplicate versions and unvetted sources.
multiple-versions = "warn"   # raise to "deny" once the tree is deduplicated
wildcards = "deny"
allow-wildcard-paths = true  # workspace-internal path deps carry no version (not a real wildcard)
deny = [
    # { crate = "openssl", reason = "use rustls; no system OpenSSL dependency" },
]
skip = [
    # { crate = "winapi" },  # tolerate a known duplicate, with a reason
]

[sources]
# Only crates.io and the project's own registries/git remotes are allowed.
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    # "https://github.com/your-org/your-fork",
]
