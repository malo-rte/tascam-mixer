# deny.toml — cargo-deny configuration
#
# Implements the dependency/license/advisory checks named in rust-coding-rules
# RS-3 enforcement map. Run with `cargo deny check` in CI. Schema as of
# cargo-deny 0.16+; run `cargo deny --version` and adjust if older.

[advisories]
# RustSec advisory database. Fail the build on any known vulnerability.
version = 2
yanked = "deny"
ignore = [
    # "RUSTSEC-0000-0000",  # document each ignore with a reason + tracking task (RS-92)
]

[licenses]
# Allow-list only. An unlisted license fails the build — review before adding.
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.9
# Copyleft licenses are absent from the allow-list, so they fail by default —
# the intended behaviour for shipped firmware/tooling. Add an explicit clarify
# block for any crate whose detected license is wrong.

[bans]
# Supply-chain hygiene: catch duplicate versions and unvetted sources.
multiple-versions = "warn"   # raise to "deny" once the tree is deduplicated
wildcard-dependencies = "deny"
deny = [
    # { crate = "openssl", reason = "use rustls; no system OpenSSL dependency" },
]
skip = [
    # { crate = "winapi" },  # tolerate a known duplicate, with a reason
]

[sources]
# Only crates.io and the project's own registries/git remotes are allowed.
unknown-registry = "deny"
unknown-git = "deny"
allow-git = [
    # "https://github.com/your-org/your-fork",
]
